<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>Beamview README banner</title>
  <desc>GitHub README banner with logo, wordmark, and tagline.</desc>
  <rect width="1280" height="320" fill="#FAF9F6"/>

  <g transform="translate(140, 128)">
    <circle cx="32" cy="32" r="30" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="32" y1="2" x2="32" y2="32" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="32" cy="32" r="3" fill="#1a1a1a"/>
  </g>

  <text x="240" y="160"
        font-family="'Helvetica Neue', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="56"
        font-weight="300"
        letter-spacing="3"
        fill="#1a1a1a">beamview</text>

  <text x="240" y="200"
        font-family="'Helvetica Neue', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="16"
        font-weight="400"
        letter-spacing="1"
        fill="#5F5E5A">Beam your game. See it instantly.</text>

  <line x1="1080" y1="140" x2="1140" y2="140" stroke="#D85A30" stroke-width="1"/>
  <text x="1080" y="168"
        font-family="'Helvetica Neue', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="2"
        fill="#5F5E5A">LOW LATENCY</text>
  <text x="1080" y="184"
        font-family="'Helvetica Neue', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="2"
        fill="#5F5E5A">CAPTURE VIEWER</text>
</svg>
